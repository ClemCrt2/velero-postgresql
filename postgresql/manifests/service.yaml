# Service ClusterIP (accès interne au cluster)
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: postgresql-integration
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql

---
# Service Headless (requis par le StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: postgresql-integration
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
