apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: postgresql-integration
  labels:
    app.kubernetes.io/name: postgresql
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 100
    shared_buffers = 256MB
    effective_cache_size = 768MB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    # PostgreSQL 18 : I/O asynchrone activé par défaut
    # io_method = io_uring  # Décommenter si supporté par le kernel
    log_timezone = 'UTC'
    datestyle = 'iso, mdy'
    timezone = 'UTC'
    lc_messages = 'en_US.utf8'
    lc_monetary = 'en_US.utf8'
    lc_numeric = 'en_US.utf8'
    lc_time = 'en_US.utf8'
    default_text_search_config = 'pg_catalog.english'
    # PostgreSQL 18 : SCRAM-SHA-256 par défaut (MD5 déprécié)
    password_encryption = scram-sha-256

  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   replication     backup_user                             trust
    local   all             all                                     scram-sha-256
    host    all             all             127.0.0.1/32            scram-sha-256
    host    all             all             ::1/128                 scram-sha-256
    host    all             all             0.0.0.0/0               scram-sha-256
