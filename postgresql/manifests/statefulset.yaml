apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: postgresql-integration
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: "18"
spec:
  serviceName: postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/version: "18"
      annotations:
        backup.velero.io/backup-volumes: postgresql-backup
        post.hook.backup.velero.io/timeout: 30s
        post.hook.backup.velero.io/command: '["/bin/bash", "-c", "pg_verifybackup /var/backup/daily-backup"]'
        pre.hook.backup.velero.io/command: '["/bin/bash", "-c", "rm -rf /var/backup/daily-backup && pg_basebackup --username=backup_user --pgdata=/var/backup/daily-backup"]'
        pre.hook.backup.velero.io/on-error: Fail
        pre.hook.backup.velero.io/timeout: 120m
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: postgres:18.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/18/docker
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql
            - name: postgresql-backup
              mountPath: /var/backup
            - name: postgresql-config
              mountPath: /etc/postgresql
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-pvc
        - name: postgresql-backup
          persistentVolumeClaim:
            claimName: postgresql-pvc-backup
        - name: postgresql-config
          configMap:
            name: postgresql-config
